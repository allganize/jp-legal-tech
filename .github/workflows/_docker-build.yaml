name: _Docker Build (Reusable)

on:
  workflow_call:
    inputs:
      service_name:
        description: "Image name (e.g., jp-legal-tech)"
        required: true
        type: string
      dockerfile:
        description: "Dockerfile path"
        required: true
        type: string
      context:
        description: "Build context"
        required: false
        default: "."
        type: string
      image_tag:
        description: "Image tag"
        required: true
        type: string
      platforms:
        description: "Platforms to build (comma-separated)"
        required: false
        default: "linux/amd64,linux/arm64"
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      SLACK_WEBHOOK_URL_FOR_DEPLOYMENT_NOTICE:
        required: true
      SLACK_WEBHOOK_URL_FOR_STAGING:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: docker.io/allganize/${{ inputs.service_name }}:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on success
        if: needs.build.result == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_FOR_STAGING }}
          SERVICE_NAME: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -n \
            --arg service "$SERVICE_NAME" \
            --arg tag "$IMAGE_TAG" \
            --arg run_url "$RUN_URL" \
            '{
              username: "GitHub Actions",
              icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              attachments: [
                {
                  color: "good",
                  title: "Docker Build Success",
                  text: ("*" + $service + "* built and pushed successfully\nTag: `" + $tag + "`"),
                  footer: $run_url
                }
              ]
            }' | curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @-

      - name: Notify Slack on failure
        if: needs.build.result == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_FOR_DEPLOYMENT_NOTICE }}
          SERVICE_NAME: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          jq -n \
            --arg service "$SERVICE_NAME" \
            --arg tag "$IMAGE_TAG" \
            --arg run_url "$RUN_URL" \
            '{
              username: "GitHub Actions",
              icon_url: "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
              attachments: [
                {
                  color: "danger",
                  title: "Docker Build Failed",
                  text: ("*" + $service + "* build failed\nTag: `" + $tag + "`\n\nCheck workflow logs for details."),
                  footer: $run_url
                }
              ]
            }' | curl -sf -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d @-
