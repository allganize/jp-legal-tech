name: "[Legal Tech] Deploy staging"

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: staging-legal-tech-deploy
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Prepare image tag
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      repo_name: ${{ steps.repo.outputs.repo_name }}
    steps:
      - name: Generate image tag
        id: tag
        run: echo "image_tag=latest" >> $GITHUB_OUTPUT

      - name: Set repo name env
        id: repo
        run: echo "repo_name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Build voice-agent (multi-arch, DockerHub)
  # ---------------------------------------------------------------------------
  build:
    needs: prepare
    uses: ./.github/workflows/_docker-build.yaml
    with:
      service_name: ${{ needs.prepare.outputs.repo_name }}
      dockerfile: ops/Dockerfile
      context: "."
      image_tag: ${{ needs.prepare.outputs.image_tag }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SLACK_WEBHOOK_URL_FOR_DEPLOYMENT_NOTICE: ${{ secrets.SLACK_WEBHOOK_URL_FOR_DEPLOYMENT_NOTICE }}
      SLACK_WEBHOOK_URL_FOR_STAGING: ${{ secrets.SLACK_WEBHOOK_URL_FOR_STAGING }}

  # ---------------------------------------------------------------------------
  # Trigger K8s image update for staging
  # ---------------------------------------------------------------------------
  trigger-k8s-update:
    needs: [prepare, build]
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger K8s image update (staging)
        env:
          GH_TOKEN: ${{ secrets.ALLGANIZE_OPS_GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.image_tag }}
        run: |
          gh workflow run update-ai-native-app-image-simple.yml \
            --repo allganize/saas-helm-charts \
            --ref main \
            -f environment=staging-us \
            -f service=${{ needs.prepare.outputs.repo_name }} \
            -f tag="$TAG"
