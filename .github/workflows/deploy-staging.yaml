name: "[jp-legal-tech] Deploy staging"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: staging-jp-legal-tech-deploy
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Generate image tag
        id: tag
        run: echo "image_tag=$(date -u +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT

  build-and-push:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/allganize/jp-legal-tech:${{ needs.prepare.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
