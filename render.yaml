services:
  - type: web
    name: jp-legal-tech-api
    runtime: python
    buildCommand: pip install .
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
